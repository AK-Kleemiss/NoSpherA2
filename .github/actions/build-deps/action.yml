name: 'Build Dependencies'
description: 'Build platform-specific dependencies'
inputs:
  platform:
    description: 'Target platform'
    required: true

runs:
  using: 'composite'
  steps:
  #SETUP RUST STUFF
    - name: Setup Cargo environment (Unix)
      if: inputs.platform != 'Windows'
      shell: bash
      run: |
        # Ensure cargo is in PATH and verify version
        source ~/.cargo/env || true
        export PATH="$HOME/.cargo/bin:$PATH"
        echo "PATH=$HOME/.cargo/bin:$PATH" >> $GITHUB_ENV
        
        # Verify we have the right version
        cargo --version
        rustc --version

    - name: Setup Cargo environment (Windows)
      if: inputs.platform == 'Windows'
      shell: powershell
      run: |
        # Ensure cargo is in PATH
        $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
        
        # Verify we have the right version
        & "$env:USERPROFILE\.cargo\bin\cargo.exe" --version
        & "$env:USERPROFILE\.cargo\bin\rustc.exe" --version

  #BUILD DEPENDENCIES USING MAKEFILE TARGETS
    - name: Build deps (macOS ARM64)
      if: inputs.platform == 'Mac_ARM64'
      shell: bash
      run: |
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        export PATH="$HOME/.cargo/bin:$PATH"
        make featomic_arm64 LibCint_arm64 -j

    - name: Build deps (macOS x86_64)
      if: inputs.platform == 'Mac_x86_64'
      shell: bash
      run: |
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        export PATH="$HOME/.cargo/bin:$PATH"
        make featomic_x86_64 LibCint_x86_64 -j

    - name: Build deps (Linux)
      if: inputs.platform == 'Linux'
      shell: bash
      run: |
        source ~/.cargo/env || true
        export PATH="$HOME/.cargo/bin:$PATH"
        make IntelMKL featomic LibCint -j
        echo "LD_LIBRARY_PATH=${{ github.workspace }}/Lib/MKL/compiler/2025.2/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    - name: Build dependencies (Windows)
      if: inputs.platform == 'Windows'
      shell: powershell
      run: |
        # Ensure cargo is in PATH
        $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
        
        make IntelMKL

        #Build featomic
        if (-not (Test-Path "Lib\featomic_install\lib\metatensor.lib")) {
          Write-Host "Building featomic for Windows"
          cd featomic\featomic
          $buildDir = "build"
          if (-not (Test-Path $buildDir)) {
            mkdir $buildDir
          }
          cd $buildDir
          cmake -G "Visual Studio 17 2022" ${{ env.FEATOMIC_CMAKE_FLAGS }} -DCMAKE_INSTALL_PREFIX="..\..\..\Lib\featomic_install" ..
          msbuild -nologo .\featomic.sln -p:Configuration=Release
          msbuild -nologo .\INSTALL.vcxproj -p:Configuration=Release
        } else {
          Write-Host "Skipping featomic build, already exists"
        }

        $src = Join-Path $env:GITHUB_WORKSPACE "libcint"
        $build = Join-Path $src "build"
        $outDir = Join-Path $env:GITHUB_WORKSPACE "Lib\LibCint\lib"
        $cintLib = Join-Path $build "Release\cint.lib"

        if (!(Test-Path $cintLib)) {
          Write-Host "Building LibCint for Windows..."

          New-Item -ItemType Directory -Force -Path $build | Out-Null
          Push-Location $build

          cmake -DBUILD_SHARED_LIBS=0 ..
          cmake --build . --config Release

          Pop-Location

          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          Copy-Item -Force $cintLib (Join-Path $outDir "cint.lib")

          Write-Host "LibCint built and copied to $outDir"
        }
        else {
          Write-Host "Skipping LibCint build, $cintLib already exists"
        }