name: 'Build Dependencies'
description: 'Build platform-specific dependencies'
inputs:
  platform:
    description: 'Target platform'
    required: true

runs:
  using: 'composite'
  steps:
  #SETUP RUST STUFF
    - name: Setup Cargo environment (Unix)
      if: inputs.platform != 'Windows'
      shell: bash
      run: |
        # Ensure cargo is in PATH and verify version
        source ~/.cargo/env || true
        export PATH="$HOME/.cargo/bin:$PATH"
        echo "PATH=$HOME/.cargo/bin:$PATH" >> $GITHUB_ENV
        
        # Verify we have the right version
        cargo --version
        rustc --version

    - name: Setup Cargo environment (Windows)
      if: inputs.platform == 'Windows'
      shell: powershell
      run: |
        # Ensure cargo is in PATH
        $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
        
        # Verify we have the right version
        & "$env:USERPROFILE\.cargo\bin\cargo.exe" --version
        & "$env:USERPROFILE\.cargo\bin\rustc.exe" --version

  #BUILD DEPENDENCIES USING MAKEFILE TARGETS
    - name: Build deps (macOS ARM64)
      if: inputs.platform == 'Mac_ARM64'
      shell: bash
      run: |
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        export PATH="$HOME/.cargo/bin:$PATH"
        make featomic_arm64 LibCint_arm64 -j

    - name: Build deps (macOS x86_64)
      if: inputs.platform == 'Mac_x86_64'
      shell: bash
      run: |
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        export PATH="$HOME/.cargo/bin:$PATH"
        make featomic_x86_64 LibCint_x86_64 -j

    - name: Build deps (Linux)
      if: inputs.platform == 'Linux'
      shell: bash
      run: |
        source ~/.cargo/env || true
        export PATH="$HOME/.cargo/bin:$PATH"
        make IntelMKL featomic LibCint -j
        echo "LD_LIBRARY_PATH=${{ github.workspace }}/Lib/MKL/compiler/2025.2/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    - name: Build dependencies (Windows)
      if: inputs.platform == 'Windows'
      shell: powershell
      run: |
        # Ensure cargo is in PATH
        $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"

        #Build Intel MKL
        # Ensure nuget.exe is available
        if (-not (Get-Command nuget -ErrorAction SilentlyContinue)) {
          choco install nuget.commandline -y
        }

        New-Item -ItemType Directory -Force -Path Windows\packages_mkl | Out-Null

        # Development package: headers + .lib import libs
        nuget install intelmkl.devel.win-x64 -OutputDirectory Windows\packages_mkl -ExcludeVersion

        # Runtime package: DLLs needed at runtime
        nuget install intelmkl.redist.win-x64 -OutputDirectory Windows\packages_mkl -ExcludeVersion

        #Build featomic
        if (-not (Test-Path "Lib\featomic_install\lib\metatensor.lib")) {
          Write-Host "Building featomic for Windows"
          cd featomic\featomic
          $buildDir = "build"
          if (-not (Test-Path $buildDir)) {
            mkdir $buildDir
          }
          cd $buildDir
          cmake -G "Visual Studio 17 2022" ${{ env.FEATOMIC_CMAKE_FLAGS }} -DCMAKE_INSTALL_PREFIX="..\..\..\Lib\featomic_install" ..
          msbuild -nologo .\featomic.sln -p:Configuration=Release
          msbuild -nologo .\INSTALL.vcxproj -p:Configuration=Release
        } else {
          Write-Host "Skipping featomic build, already exists"
        }

        $build = Join-Path $env:GITHUB_WORKSPACE "libcint\build"
        $outDir = Join-Path $env:GITHUB_WORKSPACE "Lib\LibCint\lib"

        if (!(Test-Path $outDir)) {
          Write-Host "Building LibCint for Windows..."

          New-Item -ItemType Directory -Force -Path $build | Out-Null
          Push-Location $build

          cmake -DBUILD_SHARED_LIBS=0 -DCMAKE_BUILD_TYPE=RELEASE -DCMAKE_INSTALL_PREFIX="../../Lib/LibCint" -DCMAKE_C_COMPILER=cl ..
          cmake --build . --config RELEASE
          cmake --install .
        }
        else {
          Write-Host "Skipping LibCint build, $outDir already exists"
        }

    - name: Generate MKL.auto.props from NuGet MKL package
      if: inputs.platform == 'Windows'
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"

        $candidates = @()
        $candidates += Join-Path $env:GITHUB_WORKSPACE "Windows\packages_mkl"
        $candidates += Join-Path $env:USERPROFILE ".nuget\packages\intelmkl.devel.win-x64"

        function Find-MklHeader([string]$root) {
          if (-not (Test-Path $root)) { return $null }
          Get-ChildItem -Path $root -Recurse -Filter "mkl.h" -File -ErrorAction SilentlyContinue |
            Select-Object -First 1
        }

        $mklh = $null
        foreach ($c in $candidates) {
          $mklh = Find-MklHeader $c
          if ($mklh) { break }
        }

        if (-not $mklh) {
          throw "Could not find mkl.h under: $($candidates -join ', ')"
        }

        $includeDir = Split-Path $mklh.FullName -Parent
        $mklRoot    = Split-Path $includeDir -Parent

        if (-not (Test-Path (Join-Path $mklRoot "include\mkl.h"))) {
          throw "Computed MKLROOT does not contain include\mkl.h: $mklRoot"
        }

        $propsPath = Join-Path $env:GITHUB_WORKSPACE "Windows\MKL.auto.props"

        $xml = '<Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003">' +
               "`n  <PropertyGroup>`n    <MKLROOT>$mklRoot</MKLROOT>`n  </PropertyGroup>`n</Project>`n"

        Set-Content -Path $propsPath -Value $xml -Encoding UTF8
        Write-Host "Wrote $propsPath with MKLROOT=$mklRoot"