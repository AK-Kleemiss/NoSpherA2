name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      upload_libs:
        description:  >
          Uploads the created libs as artifacts. If not, saves space on CI runs, but can be useful for debugging. Only applies to the dependencies job.
        required: false
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
    FEATOMIC_CMAKE_FLAGS: "-DCMAKE_BUILD_TYPE=Release -DFEATOMIC_FETCH_METATENSOR=ON -DBUILD_SHARED_LIBS=OFF"
    OCC_DATA_PATH: "${{ github.workspace }}/occ/share"
    SCCACHE_GHA_ENABLED: "true"
    RUSTC_WRAPPER: "sccache"

jobs:
  # Build matrix for all platforms
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest  # Apple Silicon (ARM64)
            name: Mac_ARM64
            build-script: "make NoSpherA2_arm64 COMP=\"sccache clang++\" -j && cp Mac/NoSpherA2_arm64 ./"
            artifact-name: executable_MacOS_ARM64
            executable-path: Mac/NoSpherA2_arm64
            artifact-path: |
              Mac/NoSpherA2_arm64
              Mac/libomp.dylib


          - os: macos-15-intel  # Intel x86_64
            name: Mac_x86_64
            build-script: "make NoSpherA2_x86_64 COMP=\"sccache clang++\" -j && cp Mac/NoSpherA2_x86_64 ./"
            artifact-name: executable_MacOS_x86_64
            executable-path: Mac/NoSpherA2_x86_64
            artifact-path: |
              Mac/NoSpherA2_x86_64
              Mac/libomp.dylib

          - os: ubuntu-latest
            name: Linux
            build-script: "cd Linux && make COMP=\"sccache g++\" -j && cp NoSpherA2 ../"
            artifact-name: executable_Linux
            artifact-path: |
              NoSpherA2
              libiomp5.so

          - os: windows-2022
            name: Windows
            build-script: |
              cd Windows
              msbuild NoSpherA2.sln -nologo -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143 -p:SkipBuildDependencies=true
            artifact-name: executable_Windows
            artifact-path: |
              Windows/x64/Release/NoSpherA2.exe
              Windows/x64/Release/libiomp5md.dll

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
        fetch-depth: 1

    - name: Setup Build Environment
      uses: ./.github/actions/setup-build-env
      with:
        platform: ${{ matrix.name }}

    - name: Cache Dependencies
      uses: ./.github/actions/cache-deps
      with:
        platform: ${{ matrix.name }}

    - name: Build Dependencies
      uses: ./.github/actions/build-deps
      with:
        platform: ${{ matrix.name }}
        upload_libs: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_libs == 'true' }}

    - name: Build NoSpherA2
      run: ${{ matrix.build-script }}

    - name: Bundle libomp into binary (macOS)
      if: runner.os == 'macOS'
      run: |
        LIBOMP=$(brew --prefix libomp)/lib/libomp.dylib
        BINARY=${{ matrix.executable-path }}
        cp "$LIBOMP" "$(dirname $BINARY)/libomp.dylib"
        install_name_tool -change "$LIBOMP" "@executable_path/libomp.dylib" "$BINARY"

    - name: Upload Artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ matrix.artifact-name }}
        path: ${{ matrix.artifact-path }}

  # Create macOS Universal Binary
  build_mac_universal:
    needs: build
    runs-on: macos-latest
    name: Build macOS Universal Binary

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
        fetch-depth: 1

    - name: Download ARM64 Binary
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        name: executable_MacOS_ARM64
        path: ./arm64/

    - name: Download x86_64 Binary
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        name: executable_MacOS_x86_64
        path: ./x86_64/

    - name: Create Universal Binary with lipo
      run: |
        echo "Creating universal binary with lipo..."
        mkdir -p universal
        
        # Make binaries executable
        chmod +x ./arm64/NoSpherA2_arm64
        chmod +x ./x86_64/NoSpherA2_x86_64
        
        # Verify architectures before combining
        echo "ARM64 binary architecture:"
        file ./arm64/NoSpherA2_arm64
        lipo -info ./arm64/NoSpherA2_arm64
        
        echo "x86_64 binary architecture:"
        file ./x86_64/NoSpherA2_x86_64
        lipo -info ./x86_64/NoSpherA2_x86_64
        
        # Create universal binary
        lipo -create -output ./universal/NoSpherA2_Mac ./arm64/NoSpherA2_arm64 ./x86_64/NoSpherA2_x86_64
        
        # Verify universal binary
        echo "Universal binary architecture:"
        file ./universal/NoSpherA2_Mac
        lipo -info ./universal/NoSpherA2_Mac
        
        # Make executable
        chmod +x ./universal/NoSpherA2_Mac

    - name: Upload Universal Binary
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: executable_MacOS_Universal
        path: ./universal/NoSpherA2_Mac

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest  # Apple Silicon (ARM64)
            name: Mac_ARM64
            artifact-name: executable_MacOS_ARM64
            artifact-path: Mac
            executable-name: NoSpherA2_arm64

          - os: macos-15-intel  # Intel x86_64
            name: Mac_x86_64
            artifact-name: executable_MacOS_x86_64
            artifact-path: Mac
            executable-name: NoSpherA2_x86_64

          - os: ubuntu-latest
            name: Linux
            artifact-name: executable_Linux
            artifact-path: |
              NoSpherA2
              libiomp5.so
            executable-name: NoSpherA2

          - os: windows-2022
            name: Windows
            artifact-name: executable_Windows
            artifact-path: |
              Windows/x64/Release/NoSpherA2.exe
              Windows/x64/Release/libiomp5md.dll
            executable-name: NoSpherA2.exe

    runs-on: ${{ matrix.os }}
    name: Test ${{ matrix.name }}

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        name: ${{ matrix.artifact-name }}
        path: ${{ github.workspace }}

    - name: Set executable path
      id: set-exe
      shell: bash
      run: |
        echo "NOS_EXE=${{ github.workspace }}/${{ matrix.executable-name }}" >> $GITHUB_ENV

    - name: "Set up Python"
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version-file: "pyproject.toml"

    - name: Install uv
      uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0

    - name: Install the project
      run: uv sync --locked --all-extras --dev

    - name: Make executable
      if: runner.os == 'macOS' || runner.os == 'Linux'
      run: chmod +x ${{ env.NOS_EXE }}

    - name: Run tests
      run: uv run pytest

    - name: Check for failed logs
      id: check-failed-logs
      if: always()
      shell: bash
      run: |
        if [ -d "${{ github.workspace }}/tests/failed_logs" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload Artifacts
      if: always() && steps.check-failed-logs.outputs.exists == 'true'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: Failed Tests - ${{ matrix.name }}
        path: ${{github.workspace}}/tests/failed_logs

  # Combine all artifacts
  combine_all:
    needs: [build, build_mac_universal]
    runs-on: ubuntu-latest
    name: Combine All Executables

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - name: Download Linux Executable
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        name: executable_Linux

    - name: Download macOS Universal Binary
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        name: executable_MacOS_Universal

    - name: Download Windows Executable
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        name: executable_Windows

    - name: Archive all executables
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: executables
        path: |
          NoSpherA2
          NoSpherA2.exe
          NoSpherA2_Mac

  # Security analysis jobs
  CodeQL:
    name: Analyze
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
        fetch-depth: 1

    - name: Initialize CodeQL
      uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
      with:
        languages: ${{ matrix.language }}
        source-root: Src

    - name: Setup Build Environment
      uses: ./.github/actions/setup-build-env
      with:
        platform: Linux

    - name: Cache Dependencies
      uses: ./.github/actions/cache-deps
      with:
        platform: Linux

    - name: Build Dependencies
      uses: ./.github/actions/build-deps
      with:
        platform: Linux
        upload_libs: false

    - name: Build project
      run: cd Linux && make -j1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
      with:
        output: 'codeql-results.sarif'
      continue-on-error: true

    - name: Upload analysis results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
      with:
        sarif_file: ${{github.workspace}}/codeql-results.sarif
        category: codeql
      continue-on-error: true

  flawfinder:
    name: flawfinder
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
            submodules: false
            fetch-depth: 1

      - name: transfer to UTF8
        run: |
          find Src/. -type f -exec bash -c 'file="$1"; if [[ $(file -b --mime-encoding "$file") != "utf-8" ]]; then iconv -f ISO-8859-1 -t UTF-8 "$file" -o "${file}.utf8" && mv "${file}.utf8" "$file"; fi' _ {} \;

      - name: flawfinder_scan
        uses: david-a-wheeler/flawfinder@c57197cd6061453f10a496f30a732bc1905918d1 # 2.0.19
        with:
          arguments: '--sarif Src'
          output: 'flawfinder_results.sarif'
        continue-on-error: true

      - name: Upload analysis results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          sarif_file: ${{github.workspace}}/flawfinder_results.sarif
          category: flawfinder
