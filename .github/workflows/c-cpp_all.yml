name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  CTEST_PARALLEL_LEVEL: 4
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}

    env:
      SCCACHE_DIR: ${{ runner.temp }}/sccache
      SCCACHE_CACHE_SIZE: "3G"

      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux Release
            os: ubuntu-24.04
            configure-preset: release-linux
            build-preset: release-linux
            test-preset: release-linux
            build-directory: build/release-linux
            architecture: x86_64
            shell: bash
            artifact-path: artifacts/NoSpherA2-linux-x86_64.tar.gz
            artifact-name: NoSpherA2-linux-x86_64

          - name: Windows Release
            os: windows-2022
            configure-preset: release-windows
            build-preset: release-windows
            test-preset: release-windows
            build-directory: build/release-windows
            architecture: x86_64
            shell: pwsh
            artifact-path: artifacts/NoSpherA2-windows-x64.zip
            artifact-name: NoSpherA2-windows-x64

          - name: macOS arm64 Release
            os: macos-15
            configure-preset: release-macos-arm64
            build-preset: release-macos-arm64
            test-preset: release-macos-arm64
            build-directory: build/release-macos-arm64
            architecture: arm64
            shell: bash
            artifact-path: artifacts/NoSpherA2-macos-arm64.tar.gz
            artifact-name: NoSpherA2-macos-arm64

          - name: macOS x86_64 Release
            os: macos-15-intel
            configure-preset: release-macos-x86_64
            build-preset: release-macos-x86_64
            test-preset: release-macos-x86_64
            build-directory: build/release-macos-x86_64
            architecture: x86_64
            shell: bash
            artifact-path: artifacts/NoSpherA2-macos-x86_64.tar.gz
            artifact-name: NoSpherA2-macos-x86_64

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          fetch-depth: 1


      - name: Compute dependency fingerprint
        id: dependency-fingerprint
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          import pathlib
          import subprocess

          digest = hashlib.sha256()

          # Captures the exact revisions of libcint, OCC, mdspan, featomic,
          # and any nested submodules.
          digest.update(
              subprocess.check_output(
                  ["git", "submodule", "status", "--recursive"]
              )
          )

          # Files outside the submodules that affect dependency configuration.
          patterns = [
              "CMakeLists.txt",
              "CMakePresets.json",
              "scripts/BootstrapMicromamba.cmake",
              "environment*.yaml",
              "cmake/**/*.cmake",
          ]

          for pattern in patterns:
              for path in sorted(pathlib.Path(".").glob(pattern)):
                  if not path.is_file():
                      continue

                  digest.update(path.as_posix().encode("utf-8"))
                  digest.update(b"\0")
                  digest.update(path.read_bytes())
                  digest.update(b"\0")

          with open(
              os.environ["GITHUB_OUTPUT"],
              "a",
              encoding="utf-8",
          ) as output:
              print(f"value={digest.hexdigest()}", file=output)
          PY

      # Ninja uses whichever compiler environment is active. On Windows,
      # initialize the x64 MSVC environment before configuring CMake.
      - name: Initialize MSVC x64 environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Show toolchain
        run: |
          cmake --version
          ninja --version
          git --version

      - name: Show MSVC compiler
        if: runner.os == 'Windows'
        run: |
          where.exe cl
          cl
        continue-on-error: true

      - name: Bootstrap micromamba environments
        run: cmake -P scripts/BootstrapMicromamba.cmake

      # Cargo's registry and Git checkout caches contain downloaded sources,
      # not compiler outputs. Rust compiler outputs are handled by sccache.
      - name: Cache Cargo downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-downloads-v1-${{ runner.os }}-${{ matrix.architecture }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-downloads-v1-${{ runner.os }}-${{ matrix.architecture }}-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.16.0"

      - name: Restore packed sccache
        id: sccache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-packed-v1-${{ runner.os }}-${{ matrix.architecture }}-${{ matrix.configure-preset }}-${{ steps.dependency-fingerprint.outputs.value }}
          restore-keys: |
            sccache-packed-v1-${{ runner.os }}-${{ matrix.architecture }}-${{ matrix.configure-preset }}-

      # Configure a fresh build tree. sccache reuses individual compilation
      # results, so the CMake/Ninja tree itself does not need to be cached.
      - name: Configure
        run: >-
          cmake --preset "${{ matrix.configure-preset }}"
          -DNOSPHERA2_BUILD_TESTS=ON
          -DNOSPHERA2_DEPENDENCIES_ONLY=OFF
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset "${{ matrix.build-preset }}" --parallel 4

      - name: Show sccache statistics
        if: always()
        run: sccache --show-stats

      - name: Stop sccache
        run: sccache --stop-server
        continue-on-error: true

      - name: Save packed sccache
        if: steps.sccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.sccache-restore.outputs.cache-primary-key }}

      - name: Run tests
        run: ctest --preset "${{ matrix.test-preset }}" --output-on-failure

      - name: Package Unix artifacts
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts

          tar \
            -czf "${{ matrix.artifact-path }}" \
            -C "${{ matrix.build-directory }}/bin" \
            .

          echo "Created artifact:"
          ls -lah artifacts

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null

          Compress-Archive `
            -Path "${{ matrix.build-directory }}\bin\*" `
            -DestinationPath "${{ matrix.artifact-path }}" `
            -Force

          Write-Host "Created artifact:"
          Get-ChildItem artifacts

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Upload test logs after failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ runner.os }}-${{ matrix.architecture }}
          if-no-files-found: ignore
          path: |
            ${{ matrix.build-directory }}/Testing/Temporary
            ${{ matrix.build-directory }}/CMakeFiles/CMakeConfigureLog.yaml
            ${{ matrix.build-directory }}/CMakeCache.txt
  # Combine the separately built Apple Silicon and Intel artifacts into one
  # universal macOS package. This operates on the already packaged build
  # outputs, so the two architecture builds remain independent and testable.
  macos-universal:
    name: macOS Universal Release
    needs: build
    runs-on: macos-15

    steps:
      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: NoSpherA2-macos-arm64
          path: downloads/arm64

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: NoSpherA2-macos-x86_64
          path: downloads/x86_64

      - name: Extract architecture-specific packages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p extracted/arm64 extracted/x86_64 universal artifacts
          tar -xzf downloads/arm64/NoSpherA2-macos-arm64.tar.gz -C extracted/arm64
          tar -xzf downloads/x86_64/NoSpherA2-macos-x86_64.tar.gz -C extracted/x86_64

      - name: Create universal binaries with lipo
        shell: bash
        run: |
          set -euo pipefail

          # Copy the complete arm64 package as the base. Every Mach-O file for
          # which an x86_64 counterpart exists is replaced by a universal file.
          ditto extracted/arm64 universal

          merged=0
          while IFS= read -r -d '' arm_file; do
            relative_path="${arm_file#extracted/arm64/}"
            intel_file="extracted/x86_64/${relative_path}"
            output_file="universal/${relative_path}"

            if [[ ! -f "${intel_file}" ]]; then
              echo "Skipping ${relative_path}: no x86_64 counterpart"
              continue
            fi

            if ! file "${arm_file}" | grep -q 'Mach-O'; then
              continue
            fi
            if ! file "${intel_file}" | grep -q 'Mach-O'; then
              echo "Skipping ${relative_path}: x86_64 counterpart is not Mach-O"
              continue
            fi

            mkdir -p "$(dirname "${output_file}")"
            lipo -create "${arm_file}" "${intel_file}" -output "${output_file}"
            chmod "$(stat -f '%Lp' "${arm_file}")" "${output_file}"

            echo "Created universal ${relative_path}:"
            lipo -info "${output_file}"
            merged=$((merged + 1))
          done < <(find extracted/arm64 -type f -print0)

          if [[ "${merged}" -eq 0 ]]; then
            echo "No matching Mach-O files were merged" >&2
            exit 1
          fi

          # The main executable must be universal. Locate it by name rather
          # than assuming an additional directory level in build/bin.
          main_executable="$(find universal -type f -name NoSpherA2 -perm -111 -print -quit)"
          if [[ -z "${main_executable}" ]]; then
            echo "Universal NoSpherA2 executable not found" >&2
            exit 1
          fi
          
          echo "Verifying universal executable: ${main_executable}"
          lipo -info "${main_executable}"
          lipo "${main_executable}" -verify_arch arm64 x86_64

          echo "Universal executable contains both arm64 and x86_64."

      - name: Package universal macOS artifact
        shell: bash
        run: |
          set -euo pipefail
          tar -czf artifacts/NoSpherA2-macos-universal.tar.gz -C universal .
          ls -lah artifacts/NoSpherA2-macos-universal.tar.gz

      - name: Upload universal macOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: NoSpherA2-macos-universal
          path: artifacts/NoSpherA2-macos-universal.tar.gz
          if-no-files-found: error

  # GitHub CodeQL C/C++ analysis. It performs a clean Linux configuration and
  # compilation so CodeQL can observe the compiler invocations.
  codeql:
    name: CodeQL C/C++ Analysis
    runs-on: ubuntu-24.04
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: c-cpp
          build-mode: manual

      - name: Bootstrap micromamba environment
        shell: bash
        run: cmake -P scripts/BootstrapMicromamba.cmake

      - name: Configure project for CodeQL
        shell: bash
        run: >-
          cmake --preset release-linux
          -DNOSPHERA2_BUILD_TESTS=OFF
          -DNOSPHERA2_DEPENDENCIES_ONLY=OFF

      - name: Build project for CodeQL
        shell: bash
        run: cmake --build --preset release-linux --parallel 4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: /language:c-cpp

  # Flawfinder is intentionally non-blocking initially. Its SARIF output is
  # still uploaded to the repository's Security tab for triage.
  flawfinder:
    name: Flawfinder Analysis
    runs-on: ubuntu-24.04
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false
          fetch-depth: 1

      - name: Install Flawfinder
        shell: bash
        run: python3 -m pip install --disable-pip-version-check flawfinder

      - name: Run Flawfinder
        shell: bash
        run: |
          set -o pipefail
          flawfinder --sarif Src > flawfinder-results.sarif

      - name: Upload Flawfinder SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flawfinder-results
          path: flawfinder-results.sarif
          if-no-files-found: warn

      - name: Upload Flawfinder results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: flawfinder-results.sarif
          category: flawfinder
